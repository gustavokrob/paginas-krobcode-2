<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Aulas de traqueamento ao vivo — Inscreva-se</title>
  <meta name="description" content="Aulas ao vivo de traqueamento, toda terça-feira. Inscreva-se com seu e-mail para participar.">

  <meta property="og:title" content="Aulas de traqueamento ao vivo — Inscreva-se">
  <meta property="og:description" content="Aulas ao vivo de traqueamento, toda terça-feira. Inscreva-se com seu e-mail para participar.">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">

  <style>
    *,*::before,*::after { box-sizing: border-box; }

    :root {
      --ink:       #0a2540;
      --ink-soft:  #425466;
      --ink-mute:  #697386;
      --line:      #e3e8ee;
      --line-soft: #eef1f6;
      --surface:   #ffffff;
      --brand:     #635bff;
      --brand-2:   #00d4ff;
      --brand-ink: #ffffff;
      --bg:        #ffffff;
      --shadow-sm: 0 1px 2px rgba(10, 37, 64, 0.04);
      --shadow:    0 4px 12px rgba(10, 37, 64, 0.06), 0 1px 2px rgba(10, 37, 64, 0.04);
      --shadow-focus: 0 0 0 4px rgba(99, 91, 255, 0.18);
      --radius:    10px;
    }

    html, body { height: 100%; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                   "Helvetica Neue", Arial, sans-serif;
      font-feature-settings: "ss01", "cv11";
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      line-height: 1.5;
      color: var(--ink);
      background: var(--bg);
      position: relative;
      overflow-x: hidden;
    }

    /* Stripe-style soft gradient backdrop, top-right */
    body::before {
      content: "";
      position: absolute;
      top: -20%;
      right: -10%;
      width: 70vw;
      height: 70vw;
      max-width: 900px;
      max-height: 900px;
      background:
        radial-gradient(closest-side,
          rgba(99, 91, 255, 0.18),
          rgba(0, 212, 255, 0.10) 45%,
          rgba(255, 255, 255, 0) 72%);
      filter: blur(8px);
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: "";
      position: absolute;
      bottom: -30%;
      left: -15%;
      width: 60vw;
      height: 60vw;
      max-width: 800px;
      max-height: 800px;
      background:
        radial-gradient(closest-side,
          rgba(99, 91, 255, 0.10),
          rgba(255, 255, 255, 0) 70%);
      pointer-events: none;
      z-index: 0;
    }

    main {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 4rem 1.5rem;
    }

    .card {
      width: 100%;
      max-width: 30rem;
      text-align: left;
    }

    .wordmark {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      font-weight: 600;
      font-size: .875rem;
      letter-spacing: -0.005em;
      color: var(--ink);
      margin-bottom: 2.5rem;
    }
    .wordmark .dot {
      width: .5rem;
      height: .5rem;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--brand), var(--brand-2));
      box-shadow: 0 0 0 3px rgba(99, 91, 255, 0.15);
    }

    h1 {
      font-size: clamp(2rem, 4.2vw, 2.75rem);
      line-height: 1.08;
      letter-spacing: -0.022em;
      margin: 0 0 1rem;
      font-weight: 700;
      color: var(--ink);
    }
    h1 .accent {
      background: linear-gradient(90deg, var(--brand), var(--brand-2));
      -webkit-background-clip: text;
              background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
    }

    .sub {
      font-size: 1.0625rem;
      color: var(--ink-soft);
      margin: 0 0 2rem;
      max-width: 28rem;
    }

    form.signup {
      display: flex;
      flex-direction: column;
      gap: .75rem;
    }

    .field {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: .5rem;
      padding: .375rem;
      border: 1px solid var(--line);
      border-radius: calc(var(--radius) + 4px);
      background: var(--surface);
      box-shadow: var(--shadow-sm);
      transition: border-color .15s ease, box-shadow .15s ease;
    }
    .field:focus-within {
      border-color: var(--brand);
      box-shadow: var(--shadow-focus);
    }

    .field input[type="email"] {
      appearance: none;
      border: 0;
      outline: 0;
      background: transparent;
      padding: .75rem .875rem;
      font-size: 1rem;
      color: var(--ink);
      font-family: inherit;
      min-width: 0;
    }
    .field input[type="email"]::placeholder { color: var(--ink-mute); }

    .btn {
      appearance: none;
      border: 0;
      cursor: pointer;
      font-family: inherit;
      font-weight: 600;
      font-size: .9375rem;
      letter-spacing: -0.005em;
      padding: .75rem 1.125rem;
      border-radius: var(--radius);
      color: var(--brand-ink);
      background: linear-gradient(180deg, #6f67ff, #544cff);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.18),
        0 1px 2px rgba(10, 37, 64, 0.18),
        0 4px 12px rgba(99, 91, 255, 0.28);
      transition: transform .08s ease, box-shadow .15s ease, filter .15s ease;
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      gap: .375rem;
    }
    .btn:hover { filter: brightness(1.04); }
    .btn:active { transform: translateY(1px); }
    .btn:focus-visible {
      outline: 0;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.18),
        0 0 0 4px rgba(99, 91, 255, 0.25);
    }
    .btn svg { width: 1rem; height: 1rem; }

    .fine {
      margin: .25rem .125rem 0;
      font-size: .8125rem;
      color: var(--ink-mute);
    }

    .success {
      display: none;
      padding: 1rem 1.125rem;
      border: 1px solid var(--line);
      border-radius: calc(var(--radius) + 4px);
      background: #f6f9fc;
      color: var(--ink);
      font-size: .9375rem;
    }
    .success strong { color: var(--ink); font-weight: 600; }
    .success.is-on { display: block; }

    @media (max-width: 480px) {
      main { padding: 3rem 1.25rem; }
      .field { grid-template-columns: 1fr; }
      .field input[type="email"] { padding: .875rem; }
      .btn { justify-content: center; padding: .875rem 1rem; }
    }
  </style>
</head>
<body>
  <main>
    <div class="card">
      <div class="wordmark">
        <span class="dot" aria-hidden="true"></span>
        Ao vivo
      </div>

      <h1>Aulas de traqueamento <span class="accent">ao vivo</span> toda terça.</h1>
      <p class="sub">Inscreva-se abaixo para participar.</p>

      <form class="signup" id="signup" novalidate>
        <label class="field" for="email">
          <input
            id="email"
            name="email"
            type="email"
            inputmode="email"
            autocomplete="email"
            required
            placeholder="voce@email.com"
            aria-label="Seu e-mail">
          <button class="btn" type="submit">
            Inscrever-se
            <svg viewBox="0 0 16 16" fill="none" aria-hidden="true">
              <path d="M6 3l5 5-5 5" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </label>
        <p class="fine">Sem spam. Você pode cancelar a qualquer momento.</p>
      </form>

      <div class="success" id="success" role="status" aria-live="polite">
        <strong>Inscrição recebida.</strong> Enviamos o link da próxima aula para o seu e-mail.
      </div>
    </div>
  </main>

  <script defer>
    (function () {
      var form = document.getElementById('signup');
      var success = document.getElementById('success');
      if (!form) return;
      form.addEventListener('submit', function (e) {
        e.preventDefault();
        var email = form.elements.email;
        if (!email.value || !email.checkValidity()) {
          email.focus();
          return;
        }
        form.style.display = 'none';
        success.classList.add('is-on');
      });
    })();
  </script>
</body>
</html>
